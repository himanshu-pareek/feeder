apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: http-route-auth-keycloak
spec:
  parentRefs:
    - name: gateway-shared
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: /auth
      filters:
      - type: URLRewrite
        urlRewrite:
          path:
            type: ReplacePrefixMatch
            replacePrefixMatch: ""
      backendRefs:
      - name: service-auth-keycloak
        port: 8080
