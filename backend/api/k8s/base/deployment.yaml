apiVersion: apps/v1
kind: Deployment
metadata:
  name: feeder-api
  labels:
    app: feeder
    stack: backend
    layer: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feeder-api
  template:
    metadata:
      labels:
        app: feeder-api
    spec:
      containers:
      - name: api
        image: gcr.io/feeder-project/api:latest # Placeholder
        ports:
        - containerPort: 8080
        envFrom:
          configMapRef: feeder-api-config
          secretRef: feeder-api-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
