apiVersion: apps/v1
kind: Deployment
metadata:
  name: feeder-api
  labels:
    app: feeder
    stack: backend
    layer: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: feeder
      stack: backend
      layer: api
  template:
    metadata:
      labels:
        app: feeder
        stack: backend
        layer: api
    spec:
      containers:
      - name: api
        image: asia-south1-docker.pkg.dev/project-3c1031a2-d22c-407b-a8b/feeder-application/backend-api:v0.0.3 # Placeholder
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: feeder-api-config
        - secretRef:
            name: feeder-api-secrets
        resources:
          requests:
            memory: "5G"
            cpu: "1"
          limits:
            memory: "5G"
            cpu: "1"
        # 1. STARTUP PROBE: Protects the slow startup
        startupProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          failureThreshold: 15    # 15 attempts * 10 seconds = 150 seconds max wait time
          periodSeconds: 10       # Check every 10 seconds
          
        # 2. LIVENESS PROBE: Restarts a deadlocked JVM
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 8080
          failureThreshold: 3
          periodSeconds: 10
          
        # 3. READINESS PROBE: Controls traffic routing (fixes the 503 error)
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          failureThreshold: 3
          periodSeconds: 10
  


